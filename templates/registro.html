{% extends 'base.html' %}
{% block content %}
<div class="bg-white p-6 rounded-lg shadow-md mt-6">
    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Crear Cuenta</h2>
    
    <form method="POST">
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-semibold mb-2">Nombre de Usuario</label>
            <input type="text" name="username" class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500" required>
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-semibold mb-2">Contraseña</label>
            <input type="password" name="password" class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500" required>
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg transition duration-200">
            Registrarse
        </button>
    </form>
    
    <div class="mt-6 text-center text-sm text-gray-600">
        ¿Ya tienes cuenta? <a href="{{ url_for('login') }}" class="text-blue-600 font-semibold hover:underline">Inicia sesión</a>
    </div>
</div>
{% endblock %}
